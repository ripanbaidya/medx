server:
  port: 8082

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://${USER_DB_HOST:localhost}:${USER_DB_PORT:5434}/${USER_DB_NAME:user_db}
    username: ${USER_DB_USERNAME:postgres}
    password: ${USER_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: UserServiceHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8081/realms/medx/protocol/openid-connect/certs}
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/medx}

keycloak:
  admin:
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8081}
    realm: ${KEYCLOAK_REALM:medx}
    client-id: ${KEYCLOAK_CLIENT_ID:medx-client}
    client-secret: ${KEYCLOAK_CLIENT_SECRET:medx-client-secret}
    admin-username: ${KEYCLOAK_ADMIN_USER:admin}
    admin-password: ${KEYCLOAK_ADMIN_PASS:admin}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:your-cloud-name}
  api-key: ${CLOUDINARY_API_KEY:your-api-key}
  api-secret: ${CLOUDINARY_API_SECRET:your-api-secret}

eureka:
  instance:
    instance-id: ${spring.application.name}:${server.port}

app:
  service-name: user-service

logging:
  level:
    com.medx.user: debug
    org.springframework.security: debug

info:
  app:
    description: "User Service for MedX - manages user accounts, profiles, and authentication"